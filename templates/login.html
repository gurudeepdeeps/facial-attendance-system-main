<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facial Attendance System - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Facial Attendance System - Enhanced Design */

:root {
    --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    --dark-bg: #0f0f23;
    --dark-card: #1a1a2e;
    --accent-blue: #667eea;
    --accent-purple: #764ba2;
    --text-primary: #2d3436;
    --text-light: #636e72;
    --glass-bg: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.2);
    --shadow-light: 0 8px 32px rgba(102, 126, 234, 0.15);
    --shadow-heavy: 0 20px 60px rgba(0, 0, 0, 0.1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--dark-bg);
    background-image: 
        radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(79, 172, 254, 0.1) 0%, transparent 50%);
    min-height: 100vh;
    color: #ffffff;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.02)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.02)"/><circle cx="50" cy="10" r="1" fill="rgba(255,255,255,0.02)"/><circle cx="90" cy="40" r="1" fill="rgba(255,255,255,0.02)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
    opacity: 0.3;
    pointer-events: none;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
}

/* Enhanced Buttons */
.btn {
    padding: 14px 32px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-weight: 600;
    font-size: 0.95rem;
    position: relative;
    overflow: hidden;
}

.btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s;
}

.btn:hover::before {
    left: 100%;
}

.btn-primary {
    background: var(--primary-gradient);
    color: #ffffff;
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
}

/* Animated Login Form */
.login-form {
    max-width: 450px;
    margin: 50px auto;
    backdrop-filter: blur(20px);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    padding: 3rem;
    border-radius: 24px;
    box-shadow: var(--shadow-heavy);
    position: relative;
    animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.login-form::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: var(--primary-gradient);
    border-radius: 26px;
    z-index: -1;
    opacity: 0.7;
    animation: glow 3s ease-in-out infinite;
}

.login-form h2 {
    text-align: center;
    margin-bottom: 0.5rem;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -1px;
}

.login-subtitle {
    text-align: center;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 2.5rem;
    font-size: 1rem;
    font-weight: 400;
}

.form-toggle {
    display: flex;
    margin-bottom: 2rem;
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    position: relative;
}

.toggle-btn {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: rgba(255, 255, 255, 0.7);
    transition: all 0.3s ease;
    font-weight: 500;
    position: relative;
    z-index: 2;
}

.toggle-btn.active {
    color: #ffffff;
}

.toggle-slider {
    position: absolute;
    top: 0;
    left: 0;
    width: 50%;
    height: 100%;
    background: var(--primary-gradient);
    border-radius: 10px;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1;
}

.form-group {
    margin-bottom: 1.5rem;
    position: relative;
}

.password-group {
    position: relative;
}

.form-group input {
    width: 100%;
    padding: 16px 20px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    font-size: 16px;
    background: rgba(255, 255, 255, 0.05);
    color: #ffffff;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    font-family: inherit;
}

.password-group input {
    padding-right: 56px;
}

.password-toggle {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.75);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.password-toggle:hover {
    background: rgba(255, 255, 255, 0.16);
    color: #ffffff;
}

.password-toggle:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.25);
}

.form-group input::placeholder {
    color: rgba(255, 255, 255, 0.5);
}

.form-group input:focus {
    outline: none;
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    background: rgba(255, 255, 255, 0.1);
}

.error {
    color: #f5576c;
    background: rgba(245, 87, 108, 0.1);
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 1rem;
    border: 1px solid rgba(245, 87, 108, 0.2);
    backdrop-filter: blur(10px);
    animation: shake 0.5s ease-in-out;
}

.loading {
    opacity: 0.7;
    pointer-events: none;
}

.spinner {
    border: 3px solid rgba(255, 255, 255, 0.2);
    border-top: 3px solid #ffffff;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    animation: spin 1s linear infinite;
    display: inline-block;
    margin-right: 8px;
}

/* Floating icons animation */
.floating-icons {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
}

.floating-icon {
    position: absolute;
    font-size: 2rem;
    color: rgba(102, 126, 234, 0.1);
    animation: float 6s ease-in-out infinite;
}

.floating-icon:nth-child(1) {
    top: 20%;
    left: 10%;
    animation-delay: 0s;
}

.floating-icon:nth-child(2) {
    top: 60%;
    right: 15%;
    animation-delay: 2s;
}

.floating-icon:nth-child(3) {
    top: 40%;
    left: 80%;
    animation-delay: 4s;
}

.floating-icon:nth-child(4) {
    bottom: 20%;
    left: 20%;
    animation-delay: 1s;
}

.floating-icon:nth-child(5) {
    top: 10%;
    right: 30%;
    animation-delay: 3s;
}

/* Animations */
@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes glow {
    0%, 100% {
        opacity: 0.5;
    }
    50% {
        opacity: 0.8;
    }
}

@keyframes float {
    0%, 100% {
        transform: translateY(0px) rotate(0deg);
        opacity: 0.3;
    }
    25% {
        transform: translateY(-20px) rotate(5deg);
        opacity: 0.6;
    }
    50% {
        transform: translateY(-10px) rotate(-5deg);
        opacity: 0.8;
    }
    75% {
        transform: translateY(-30px) rotate(3deg);
        opacity: 0.4;
    }
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
    20%, 40%, 60%, 80% { transform: translateX(5px); }
}

/* Responsive Design */
@media (max-width: 768px) {
    .login-form {
        margin: 20px;
        padding: 2rem;
    }
    
    .login-form h2 {
        font-size: 1.8rem;
    }
    
    .btn {
        padding: 12px 24px;
        font-size: 0.9rem;
    }
    
    .form-group input {
        padding: 14px 16px;
    }
    
    .floating-icon {
        font-size: 1.5rem;
    }
}

@media (max-width: 480px) {
    .login-form {
        padding: 1.5rem;
    }
    
    .login-form h2 {
        font-size: 1.6rem;
    }
}
    </style>
</head>
<body>
    <div class="floating-icons">
        <div class="floating-icon">👤</div>
        <div class="floating-icon">📷</div>
        <div class="floating-icon">🔒</div>
        <div class="floating-icon">⏰</div>
        <div class="floating-icon">✨</div>
    </div>
    
    <div class="container">
        <div style="display: flex; gap: 30px; justify-content: center; align-items: flex-start; flex-wrap: wrap;">
            <!-- Employee Login Form -->
            <div class="login-form" id="employeeForm" style="max-width: 450px; margin: 50px auto;">
                <h2>Employee Login</h2>
                <p class="login-subtitle">Access Your Attendance Dashboard</p>
                
                {% if error %}
                    <div class="error">{{ error }}</div>
                {% endif %}
                
                <form method="POST">
                    <input type="hidden" name="login_type" value="employee">
                    <div class="form-group">
                        <input type="text" name="username" placeholder="Username" required>
                    </div>
                    <div class="form-group password-group">
                        <input type="password" id="employeePassword" name="password" placeholder="Password" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('employeePassword', this)" aria-label="Show password" aria-pressed="false">
                            <span aria-hidden="true">👁</span>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <span>Sign In</span>
                    </button>
                </form>
                
                <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                    <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 1rem;">Don't have an account?</p>
                    <a href="{{ url_for('registration') }}" class="btn btn-secondary" style="background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); width: 100%; margin-top: 10px; text-decoration: none;">Create Account</a>
                    <p style="color: rgba(255, 255, 255, 0.5); font-size: 0.85rem; margin-top: 12px;">New employee registrations require admin approval</p>
                </div>
            </div>

            <!-- Admin Login Form -->
            <div class="login-form" id="adminForm" style="max-width: 450px; margin: 50px auto;">
                <h2 style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Admin Panel</h2>
                <p class="login-subtitle">Manage Employee Approvals</p>
                
                <form method="POST">
                    <input type="hidden" name="login_type" value="admin">
                    <div class="form-group">
                        <input type="text" name="username" placeholder="Admin Username" required>
                    </div>
                    <div class="form-group password-group">
                        <input type="password" id="adminPassword" name="password" placeholder="Admin Password" required>
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('adminPassword', this)" aria-label="Show password" aria-pressed="false">
                            <span aria-hidden="true">👁</span>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        <span>Admin Login</span>
                    </button>
                </form>
                
                <div style="text-align: center; margin-top: 2rem;">
                    <p style="color: rgba(255, 255, 255, 0.7); font-size: 0.85rem;">
                        Default credentials: admin / admin123
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('span');

            if (!input || !icon) {
                return;
            }

            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            icon.textContent = isPassword ? '🙈' : '👁';
            button.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
            button.setAttribute('aria-pressed', String(isPassword));
        }

        function showRegister() {
            // Navigate to registration page
            window.location.href = '/registration';
        }

        function isValidEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        // Auto-hide error messages after 5 seconds
        const errorMessages = document.querySelectorAll('.error');
        errorMessages.forEach(msg => {
            setTimeout(() => {
                msg.style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
